# ============================================
# Jatayu Proctor - Application Configuration
# ============================================

spring.application.name=jatayu-proctor

# ---------- Database (H2 for dev) ----------
spring.datasource.url=jdbc:h2:mem:jatayudb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ---------- Server ----------
server.port=8081

# ---------- Gemini AI ----------
gemini.api.key=${GEMINI_API_KEY:your-api-key-here}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent

# ---------- CORS (for React frontend) ----------
app.cors.allowed-origins=http://localhost:3000
app.cors.allowed-origins-alt=http://localhost:3001
